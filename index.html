<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ألعاب الكرة - الأسئلة التفاعلية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --g1:#0a1628; --g2:#0d2137; --g3:#112947;
  --green:#00e676; --green2:#00c853; --green-dark:#007c28;
  --gold:#ffd600; --gold2:#ffab00;
  --blue:#00b0ff; --blue2:#0091ea;
  --red:#ff1744; --red2:#d50000;
  --purple:#e040fb; --purple2:#aa00ff;
  --white:#ffffff; --off:#e8f5e9; --muted:#78909c;
  --card: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--g1);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

/* ── PITCH BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0,230,118,0.025) 60px, rgba(0,230,118,0.025) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,230,118,0.025) 60px, rgba(0,230,118,0.025) 61px),
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,83,0.12) 0%, transparent 70%),
    linear-gradient(180deg, #0a1628 0%, #071320 100%);
  pointer-events: none;
}

/* ── NOISE OVERLAY ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.4;
}

/* ── ALL CONTENT ABOVE BG ── */
header, main, section, .modal-overlay, .toast-msg { position: relative; z-index: 1; }

/* ══════════════════ HEADER ══════════════════ */
.site-header {
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 2px solid var(--green-dark);
  padding: 0 20px;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 4px 32px rgba(0,230,118,0.15), 0 1px 0 rgba(0,230,118,0.3);
}

.header-logo {
  display: flex; align-items: center; gap: 12px;
}
.logo-ball {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 20px rgba(0,230,118,0.5);
  animation: ballFloat 3s ease-in-out infinite;
}
@keyframes ballFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.logo-text h1 { font-size: 18px; font-weight: 900; color: var(--white); line-height: 1; }
.logo-text p { font-size: 11px; color: var(--green); font-weight: 600; }

.header-right { display: flex; align-items: center; gap: 10px; }

.user-chip {
  background: rgba(0,230,118,0.12);
  border: 1.5px solid rgba(0,230,118,0.3);
  color: var(--green);
  font-size: 13px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px;
  display: none;
  align-items: center; gap: 6px;
}
.user-chip.show { display: flex; }

.teacher-btn {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: white; border: none; cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
  padding: 8px 16px; border-radius: 20px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 14px rgba(124,58,237,0.4);
  transition: all .2s;
}
.teacher-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }

/* ══════════════════ WELCOME SCREEN ══════════════════ */
.welcome-screen {
  min-height: calc(100vh - 68px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}

.welcome-card {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(0,230,118,0.2);
  border-radius: 28px;
  padding: 48px 40px;
  max-width: 460px; width: 100%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  animation: cardIn .6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.95)} to{opacity:1;transform:none} }

.welcome-stadium {
  font-size: 80px; line-height: 1; margin-bottom: 24px;
  filter: drop-shadow(0 0 30px rgba(0,230,118,0.4));
  animation: stadiumPulse 2s ease-in-out infinite;
}
@keyframes stadiumPulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(0,230,118,0.3))} 50%{filter:drop-shadow(0 0 50px rgba(0,230,118,0.7))} }

.welcome-card h2 { font-size: 28px; font-weight: 900; color: var(--white); margin-bottom: 8px; }
.welcome-card p { font-size: 15px; color: var(--muted); margin-bottom: 32px; }

.neon-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: var(--white);
  font-family: 'Cairo', sans-serif;
  font-size: 18px; font-weight: 700;
  padding: 16px 20px;
  text-align: center;
  outline: none;
  margin-bottom: 20px;
  transition: border-color .2s, box-shadow .2s;
}
.neon-input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; }
.neon-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,230,118,0.15); }

.start-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--green), var(--green2));
  color: #001a0a;
  border: none; cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 20px; font-weight: 900;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 8px 30px rgba(0,200,83,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: all .2s;
  letter-spacing: .5px;
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,200,83,0.5); }
.start-btn:active { transform: scale(0.97); }

/* ══════════════════ MAIN APP ══════════════════ */
.app-content { display: none; padding: 24px 16px 60px; max-width: 860px; margin: 0 auto; }
.app-content.show { display: block; }

/* ── TABS ── */
.tab-nav {
  display: flex; gap: 10px;
  margin-bottom: 32px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--card-border);
  padding: 6px;
  border-radius: 18px;
}
.tab-btn {
  flex: 1; border: none; background: transparent;
  cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--muted);
  padding: 12px 16px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .25s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--green-dark), #005c1f);
  color: var(--green);
  box-shadow: 0 4px 14px rgba(0,100,30,0.5);
}
.tab-btn:not(.active):hover { background: rgba(255,255,255,0.06); color: var(--white); }

/* ── QUIZ TAB ── */
.quiz-section { animation: fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.q-card {
  background: var(--card);
  border: 1.5px solid var(--card-border);
  border-radius: 22px;
  padding: 28px 26px;
  margin-bottom: 18px;
  backdrop-filter: blur(6px);
  transition: border-color .3s;
}
.q-card:hover { border-color: rgba(0,230,118,0.2); }

.q-header {
  display: flex; align-items: flex-start; gap: 14px; margin-bottom: 22px;
}
.q-num {
  width: 42px; height: 42px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--green-dark), #004d1a);
  border: 2px solid var(--green);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: var(--green);
  box-shadow: 0 0 14px rgba(0,230,118,0.2);
}
.q-text { font-size: 19px; font-weight: 700; line-height: 1.6; color: var(--white); flex: 1; }

/* TF Options */
.tf-row { display: flex; gap: 12px; }
.opt-btn {
  flex: 1; border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--white);
  font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
  padding: 14px 18px; border-radius: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .2s;
}
.opt-btn:hover { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.06); }
.opt-btn.sel-yes { border-color: var(--green); background: rgba(0,230,118,0.12); color: var(--green); box-shadow: 0 0 14px rgba(0,230,118,0.2); }
.opt-btn.sel-no { border-color: var(--red); background: rgba(255,23,68,0.1); color: #ff6b8a; box-shadow: 0 0 14px rgba(255,23,68,0.15); }

/* MCQ Grid */
.mcq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.mcq-btn {
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--white);
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  padding: 16px 18px; border-radius: 14px; cursor: pointer;
  text-align: right;
  display: flex; align-items: center; gap: 10px;
  transition: all .2s;
}
.mcq-btn:hover { border-color: rgba(0,176,255,0.4); background: rgba(0,176,255,0.06); }
.mcq-btn.selected {
  border-color: var(--blue);
  background: rgba(0,176,255,0.12);
  color: var(--blue);
  box-shadow: 0 0 14px rgba(0,176,255,0.2);
}
.mcq-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid currentColor; flex-shrink: 0; margin-right: auto; }
.mcq-btn.selected .mcq-dot { background: var(--blue); }

/* Submit */
.submit-btn {
  width: 100%; margin-top: 10px;
  background: linear-gradient(135deg, #0056b3, var(--blue2));
  color: white; border: none; cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 20px; font-weight: 900;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,145,234,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; gap: 12px;
  transition: all .2s; letter-spacing: .5px;
}
.submit-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(0,145,234,0.45); }
.submit-btn:active { transform: scale(0.98); }

/* ══════════════════ RESULT TAB ══════════════════ */
.result-section { display: none; animation: fadeUp .5s ease both; }
.result-section.show { display: block; }

.result-card {
  background: var(--card);
  border: 1.5px solid var(--card-border);
  border-radius: 28px;
  padding: 48px 32px;
  text-align: center;
  backdrop-filter: blur(6px);
  max-width: 540px; margin: 0 auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.4);
}
.result-trophy {
  font-size: 90px; line-height: 1; margin-bottom: 16px;
  filter: drop-shadow(0 0 30px rgba(255,214,0,0.5));
  animation: trophyBounce .6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes trophyBounce { from{opacity:0;transform:scale(0.4) rotate(-10deg)} to{opacity:1;transform:none} }

.result-title { font-size: 26px; font-weight: 900; margin-bottom: 28px; }

.score-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
.score-box {
  flex: 1; max-width: 140px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid var(--card-border);
  border-radius: 18px; padding: 20px 14px;
}
.score-box label { font-size: 12px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 8px; }
.score-box .val { font-size: 36px; font-weight: 900; }
.score-box.green .val { color: var(--green); }
.score-box.blue .val { color: var(--blue); }

.feedback-text { font-size: 16px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; padding: 0 8px; }

.retry-btn {
  width: 100%;
  background: rgba(0,230,118,0.1);
  border: 2px solid var(--green-dark);
  color: var(--green);
  font-family: 'Cairo', sans-serif; font-size: 17px; font-weight: 800;
  padding: 16px;
  border-radius: 14px; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.retry-btn:hover { background: rgba(0,230,118,0.15); transform: translateY(-2px); }

/* ══════════════════ TOAST ══════════════════ */
.toast-msg {
  position: fixed; top: 86px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: linear-gradient(135deg, #b71c1c, #d32f2f);
  color: white; font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 700;
  padding: 12px 24px; border-radius: 50px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 32px rgba(183,28,28,0.4);
  opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 200; white-space: nowrap;
}
.toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════ AUTH MODAL ══════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: linear-gradient(145deg, #0d2137, #112947);
  border: 1.5px solid rgba(124,58,237,0.3);
  border-radius: 26px; padding: 40px 32px;
  width: 100%; max-width: 360px; text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  animation: cardIn .4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.modal-box .lock-icon { font-size: 52px; margin-bottom: 16px; }
.modal-box h3 { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.pass-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px; color: var(--white);
  font-family: 'Cairo', sans-serif; font-size: 24px; font-weight: 900;
  padding: 14px 18px; text-align: center; outline: none;
  margin-bottom: 18px; letter-spacing: 8px;
  transition: border-color .2s;
}
.pass-input:focus { border-color: #7c3aed; }
.modal-actions { display: flex; gap: 10px; }
.modal-confirm {
  flex: 1; background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: white; border: none; cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; border-radius: 12px;
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  transition: all .2s;
}
.modal-confirm:hover { transform: translateY(-2px); }
.modal-cancel {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  color: var(--muted); cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  padding: 14px; border-radius: 12px; transition: all .2s;
}
.modal-cancel:hover { background: rgba(255,255,255,0.1); color: white; }

/* ══════════════════ TEACHER DASHBOARD ══════════════════ */
.dashboard-overlay {
  position: fixed; inset: 0; z-index: 110;
  background: #080f1c;
  display: none; overflow-y: auto;
  animation: fadeIn .3s ease;
}
.dashboard-overlay.open { display: block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.dash-header {
  background: rgba(10,22,40,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(124,58,237,0.3);
  padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
  box-shadow: 0 4px 30px rgba(124,58,237,0.2);
}
.dash-header h2 { font-size: 22px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
.close-dash-btn {
  background: rgba(239,68,68,0.15); border: 1.5px solid rgba(239,68,68,0.3);
  color: #ef4444; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
  padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: all .2s;
}
.close-dash-btn:hover { background: rgba(239,68,68,0.25); }

.dash-body { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }

.dash-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
@media(max-width:700px){ .dash-grid { grid-template-columns: 1fr; } }

.dash-card {
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 24px;
  backdrop-filter: blur(6px);
}
.dash-card h3 { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 20px; text-align: center; }

.chart-wrap { height: 220px; }

.results-table { width: 100%; border-collapse: collapse; }
.results-table th {
  text-align: right; padding: 10px 14px;
  font-size: 12px; font-weight: 700; color: var(--muted);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.results-table td {
  padding: 12px 14px;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.results-table tr:last-child td { border-bottom: none; }
.level-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.lvl-green { background: rgba(0,230,118,0.15); color: var(--green); }
.lvl-blue { background: rgba(0,176,255,0.15); color: var(--blue); }
.lvl-gold { background: rgba(255,214,0,0.15); color: var(--gold); }
.lvl-red { background: rgba(255,23,68,0.12); color: #ff6b8a; }

.no-data { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }

/* ══════════════════ RESPONSIVE ══════════════════ */
@media(max-width: 480px){
  .welcome-card { padding: 36px 22px; }
  .welcome-stadium { font-size: 60px; }
  .welcome-card h2 { font-size: 22px; }
  .q-text { font-size: 17px; }
  .q-card { padding: 22px 16px; }
  .result-card { padding: 36px 20px; }
  .result-trophy { font-size: 70px; }
  .site-header { padding: 0 14px; }
  .logo-text h1 { font-size: 15px; }
  .logo-text p { display: none; }
  .teacher-btn span:last-child { display: none; }
  .teacher-btn { padding: 8px 12px; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <div class="header-logo">
    <div class="logo-ball">⚽</div>
    <div class="logo-text">
      <h1>مختبر اللغة العربية</h1>
      <p>ألعاب الكُرَة · تفاعلي</p>
    </div>
  </div>
  <div class="header-right">
    <div class="user-chip" id="userChip"><span>⭐</span><span id="userChipName"></span></div>
    <button class="teacher-btn" onclick="openAuth()"><span>🔐</span> بوابة المعلم</button>
  </div>
</header>

<!-- ══ TOAST ══ -->
<div class="toast-msg" id="toastMsg"><span>⚠️</span><span id="toastText"></span></div>

<!-- ══ WELCOME ══ -->
<section class="welcome-screen" id="welcomeScreen">
  <div class="welcome-card">
    <div class="welcome-stadium">🏟️</div>
    <h2>درس: ألعاب الكُرَة</h2>
    <p>مرحباً بك يا بطل! ما هو اسمك؟</p>
    <input class="neon-input" type="text" id="studentName" placeholder="اكتب اسمك هنا..." autocomplete="off">
    <button class="start-btn" onclick="initApp()">ابدأ الرحلة 🚀</button>
  </div>
</section>

<!-- ══ MAIN APP ══ -->
<main class="app-content" id="appContent">

  <!-- Tabs -->
  <nav class="tab-nav">
    <button class="tab-btn active" id="btnQuiz" onclick="switchTab('quiz')">
      <span>🧠</span> الأسئلة الذكية
    </button>
    <button class="tab-btn" id="btnResult" onclick="switchTab('result')">
      <span>🏆</span> النتيجة النهائية
    </button>
  </nav>

  <!-- Quiz Section -->
  <div id="quizSection" class="quiz-section">
    <div id="quizArea"></div>
    <button class="submit-btn" onclick="checkAnswers()">
      <span>🏁</span> إنهاء وحساب الدرجة
    </button>
  </div>

  <!-- Result Section -->
  <div id="resultSection" class="result-section">
    <div class="result-card">
      <div class="result-trophy" id="resultTrophy">🎖️</div>
      <h2 class="result-title" id="resultTitle">أحسنت يا بطل!</h2>
      <div class="score-grid">
        <div class="score-box green">
          <label>الدرجة</label>
          <div class="val" id="scoreVal">0/3</div>
        </div>
        <div class="score-box blue">
          <label>النسبة</label>
          <div class="val" id="percentVal">0%</div>
        </div>
      </div>
      <p class="feedback-text" id="feedbackText"></p>
      <button class="retry-btn" onclick="location.reload()">🔄 حاول مرة أخرى</button>
    </div>
  </div>

</main>

<!-- ══ AUTH MODAL ══ -->
<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <div class="lock-icon">🔒</div>
    <h3>دخول المعلم</h3>
    <p>أدخل الرمز السري للوصول للنتائج</p>
    <input class="pass-input" type="password" id="teacherPass" placeholder="****" maxlength="6">
    <div class="modal-actions">
      <button class="modal-confirm" onclick="checkAuth()">دخول</button>
      <button class="modal-cancel" onclick="closeAuth()">إلغاء</button>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="dashboard-overlay" id="dashboardOverlay">
  <div class="dash-header">
    <h2><span>📊</span> سجل نتائج الطلاب</h2>
    <button class="close-dash-btn" onclick="closeDashboard()">✕ إغلاق</button>
  </div>
  <div class="dash-body">
    <div class="dash-grid">
      <div class="dash-card">
        <h3>توزيع المستويات</h3>
        <div class="chart-wrap"><canvas id="statsChart"></canvas></div>
      </div>
      <div class="dash-card" style="overflow-x:auto;">
        <h3>تفاصيل المحاولات</h3>
        <table class="results-table">
          <thead>
            <tr>
              <th>الاسم</th>
              <th style="text-align:center">الدرجة</th>
              <th style="text-align:center">المستوى</th>
              <th style="text-align:center">الوقت</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
        <div class="no-data" id="noDataMsg" style="display:none">لم يقم أي طالب بحل الاختبار بعد 📭</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════
   DATA
══════════════════════════════ */
const questions = [
  {
    id: 1, type: 'tf',
    text: 'كرة القدم هي اللعبة الشعبية الأولى في العالم ⚽🌍',
    ans: true
  },
  {
    id: 2, type: 'mcq',
    text: 'رياضتي المفضلة هي: ______ 🏃‍♂️🏆',
    options: ['كرة القدم ⚽', 'الخضروات 🥦', 'الطعام 🍔'],
    ans: 0
  },
  {
    id: 3, type: 'mcq',
    text: '______ هي اللعبة الشعبية الأولى في الهند 🏏🇮🇳',
    options: ['كرة القدم ⚽', 'كرة السلة 🏀', 'الكريكت 🏏'],
    ans: 2
  }
];

let userName = '';
let userAnswers = {};
let chartInst = null;

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toastMsg');
  document.getElementById('toastText').textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function initApp() {
  const name = document.getElementById('studentName').value.trim();
  if (!name) { toast('اكتب اسمك أولاً ✍️'); return; }
  userName = name;
  document.getElementById('userChipName').textContent = userName;
  document.getElementById('userChip').classList.add('show');
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('appContent').classList.add('show');
  renderQuiz();
}

/* ── ENTER KEY ── */
document.getElementById('studentName').addEventListener('keydown', e => { if(e.key==='Enter') initApp(); });

/* ══════════════════════════════
   TABS
══════════════════════════════ */
function switchTab(tab) {
  document.getElementById('quizSection').style.display   = tab==='quiz'   ? 'block' : 'none';
  document.getElementById('resultSection').classList.toggle('show', tab==='result');
  document.getElementById('btnQuiz').classList.toggle('active', tab==='quiz');
  document.getElementById('btnResult').classList.toggle('active', tab==='result');
  window.scrollTo(0,0);
}

/* ══════════════════════════════
   QUIZ RENDER
══════════════════════════════ */
function renderQuiz() {
  const area = document.getElementById('quizArea');
  area.innerHTML = questions.map((q, i) => buildCard(q, i)).join('');
}

function buildCard(q, i) {
  const head = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">${i+1}</div>
        <p class="q-text">${q.text}</p>
      </div>`;

  if (q.type === 'tf') {
    return head + `
      <div class="tf-row">
        <button class="opt-btn" onclick="selectTF(${q.id}, true, this)">صح ✅</button>
        <button class="opt-btn" onclick="selectTF(${q.id}, false, this)">خطأ ❌</button>
      </div>
    </div>`;
  } else {
    const opts = q.options.map((opt, idx) => `
      <button class="mcq-btn" onclick="selectMCQ(${q.id}, ${idx}, this)">
        <span>${opt}</span>
        <span class="mcq-dot"></span>
      </button>`).join('');
    return head + `<div class="mcq-grid">${opts}</div></div>`;
  }
}

function selectTF(qId, val, btn) {
  userAnswers[qId] = val;
  Array.from(btn.parentElement.children).forEach(b => b.classList.remove('sel-yes','sel-no'));
  btn.classList.add(val ? 'sel-yes' : 'sel-no');
}

function selectMCQ(qId, idx, btn) {
  userAnswers[qId] = idx;
  Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* ══════════════════════════════
   CHECK
══════════════════════════════ */
function checkAnswers() {
  if (Object.keys(userAnswers).length < questions.length) {
    toast('يا بطل، لم تجب على جميع الأسئلة الثلاثة! 🔍');
    return;
  }
  let score = 0;
  questions.forEach(q => { if (userAnswers[q.id] === q.ans) score++; });
  const pct = Math.round((score / questions.length) * 100);
  displayResult(score, pct);
  saveResult(userName, score, pct);
  switchTab('result');
}

function displayResult(score, pct) {
  document.getElementById('scoreVal').textContent   = `${score}/3`;
  document.getElementById('percentVal').textContent = `${pct}%`;

  const trophy  = document.getElementById('resultTrophy');
  const title   = document.getElementById('resultTitle');
  const feedbk  = document.getElementById('feedbackText');

  if (pct === 100) {
    trophy.textContent = '🏆'; title.textContent = 'ممتاز يا عبقري!';
    feedbk.textContent = 'أجبت على جميع الأسئلة بشكل صحيح، أنت نجم المباراة! 🥳';
  } else if (pct >= 66) {
    trophy.textContent = '⭐'; title.textContent = 'أداء رائع يا بطل!';
    feedbk.textContent = 'درجتك ممتازة، كدت أن تحصل على العلامة الكاملة 🎉';
  } else if (pct >= 33) {
    trophy.textContent = '👍'; title.textContent = 'جيد، واصل التقدم!';
    feedbk.textContent = 'يمكنك المحاولة مرة أخرى للحصول على العلامة الكاملة ✨';
  } else {
    trophy.textContent = '📚'; title.textContent = 'استمر في المحاولة!';
    feedbk.textContent = 'لا بأس يا بطل، المحاولة هي طريق النجاح! جرب مرة أخرى 💪';
  }
}

function saveResult(name, score, pct) {
  const level = pct===100 ? 'متفوق' : pct>=66 ? 'متميز' : pct>=33 ? 'ناجح' : 'دعم';
  let list = JSON.parse(localStorage.getItem('quiz_results') || '[]');
  list.push({ name, score, pct, level, time: new Date().toLocaleTimeString('ar-AE') });
  localStorage.setItem('quiz_results', JSON.stringify(list));
}

/* ══════════════════════════════
   TEACHER AUTH
══════════════════════════════ */
function openAuth() { document.getElementById('authModal').classList.add('open'); document.getElementById('teacherPass').value=''; }
function closeAuth() { document.getElementById('authModal').classList.remove('open'); }
document.getElementById('teacherPass').addEventListener('keydown', e => { if(e.key==='Enter') checkAuth(); });

function checkAuth() {
  if (document.getElementById('teacherPass').value === '1234') {
    closeAuth(); openDashboard();
  } else {
    toast('الرمز السري غير صحيح ❌');
  }
}

/* ══════════════════════════════
   DASHBOARD
══════════════════════════════ */
function openDashboard() {
  document.getElementById('dashboardOverlay').classList.add('open');
  loadDashboard();
}
function closeDashboard() { document.getElementById('dashboardOverlay').classList.remove('open'); }

function loadDashboard() {
  const data = JSON.parse(localStorage.getItem('quiz_results') || '[]');
  const tbody = document.getElementById('resultsBody');
  const noData = document.getElementById('noDataMsg');

  if (!data.length) { noData.style.display='block'; tbody.innerHTML=''; return; }
  noData.style.display = 'none';

  const levelColor = { 'متفوق':'lvl-green', 'متميز':'lvl-blue', 'ناجح':'lvl-gold', 'دعم':'lvl-red' };

  tbody.innerHTML = [...data].reverse().map(r => `
    <tr>
      <td style="font-weight:700">${r.name}</td>
      <td style="text-align:center;font-weight:900;color:#00e676">${r.score}/3</td>
      <td style="text-align:center"><span class="level-badge ${levelColor[r.level]||'lvl-gold'}">${r.level}</span></td>
      <td style="text-align:center;color:#546e7a;font-size:12px">${r.time}</td>
    </tr>`).join('');

  const counts = { 'متفوق':0, 'متميز':0, 'ناجح':0, 'دعم':0 };
  data.forEach(r => counts[r.level] = (counts[r.level]||0) + 1);

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('statsChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(counts),
      datasets: [{
        data: Object.values(counts),
        backgroundColor: ['#00c853','#00b0ff','#ffd600','#ff1744'],
        borderColor: 'rgba(255,255,255,0.05)',
        borderWidth: 3
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#78909c', font: { family:'Cairo', size:12 }, padding:12 }
        }
      }
    }
  });
}
</script>
</body>
</html>
